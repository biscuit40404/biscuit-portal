<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biscuit Portal - Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 40px; display: none; /* Hidden until we check if user is logged in */ }
        .wrapper { max-width: 800px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { color: #2c3e50; }
        .user-box { background: #e8f4fd; padding: 15px; border-radius: 8px; color: #2980b9; font-weight: bold; margin-bottom: 30px; }
        .btn-logout { background: #e74c3c; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; float: right; }
    </style>
</head>
<body>

    <div class="wrapper">
        <button id="logout-btn" class="btn-logout">Log Out</button>
        <h1>🍪 Secure Student Dashboard</h1>
        <div class="user-box" id="user-display">Checking credentials...</div>
        
        <p>Welcome to the core portal. This zone is locked down. If someone tries to visit this link without logging in first, the security script will automatically kick them out.</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDHBQ20Oan5NYyVbyf-0PMrIBGSNJKLYNY",
            authDomain: "biscuit-portal-1547d.firebaseapp.com",
            projectId: "biscuit-portal-1547d",
            storageBucket: "biscuit-portal-1547d.firebasestorage.app",
            messagingSenderId: "426645012012",
            appId: "1:426645012012:web:cc8d2992c474c40eaa9b89"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // THE SECURITY GUARD: Checks if a user has a valid login token
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.body.style.display = "block"; // Show the page
                document.getElementById('user-display').innerText = `Logged in as student: ${user.email}`;
            } else {
                window.location.href = "/"; // Not logged in? Kick them back to login screen
            }
        });

        // LOGOUT BUTTON
        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.href = "/";
            });
        });
    </script>
</body>
</html>
