<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biscuit Portal - Login</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; position: relative; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 100%; z-index: 2; }
        h1 { color: #2c3e50; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; background: #3498db; color: white; padding: 12px; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
        .btn:hover { background: #2980b9; }
        .toggle-text { margin-top: 20px; color: #7f8c8d; font-size: 14px; cursor: pointer; }
        .toggle-text span { color: #3498db; font-weight: bold; }
        #message { margin-top: 15px; font-weight: bold; font-size: 14px; }
        #username-group, #school-group { display: none; }
        .version-stamp { position: fixed; bottom: 16px; right: 16px; font-size: 12px; font-weight: 600; color: #94a3b8; font-family: monospace; letter-spacing: 0.5px; user-select: none; pointer-events: none; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🍪 Biscuit Portal</h1>
        <h2 id="form-title">Student Login</h2>
        
        <div id="username-group">
            <input type="text" id="username" placeholder="Choose a unique username">
        </div>

        <div id="school-group">
            <select id="grade">
                <option value="Prep 2">Prep 2</option>
            </select>
            <select id="class">
                <option value="" disabled selected>Select Your Class</option>
                <option value="2/A">2/A</option>
                <option value="2/B">2/B</option>
                <option value="2/C">2/C</option>
                <option value="2/D">2/D</option>
            </select>
        </div>
        
        <input type="email" id="email" placeholder="Enter student email">
        <input type="password" id="password" placeholder="Enter password">
        
        <button id="auth-btn" class="btn">Log In</button>
        
        <p class="toggle-text" id="toggle-form">Don't have an account? <span>Register here</span></p>
        <p id="message"></p>
    </div>

    <div class="version-stamp" id="version-display-node">Loading...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

        const APP_VERSION = "v1.1.0";
        document.getElementById('version-display-node').innerText = APP_VERSION;

        const firebaseConfig = {
            apiKey: "AIzaSyDHBQ20Oan5NYyVbyf-0PMrIBGSNJKLYNY",
            authDomain: "biscuit-portal-1547d.firebaseapp.com",
            projectId: "biscuit-portal-1547d",
            storageBucket: "biscuit-portal-1547d.firebasestorage.app",
            messagingSenderId: "426645012012",
            appId: "1:426645012012:web:cc8d2992c474c40eaa9b89"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const formTitle = document.getElementById('form-title');
        const authBtn = document.getElementById('auth-btn');
        const toggleForm = document.getElementById('toggle-form');
        const usernameGroup = document.getElementById('username-group');
        const schoolGroup = document.getElementById('school-group');
        const usernameInput = document.getElementById('username');
        const gradeInput = document.getElementById('grade');
        const classInput = document.getElementById('class');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const messageDisplay = document.getElementById('message');

        let isLoginMode = true;
        let isRegisteringNow = false;

        onAuthStateChanged(auth, (user) => {
            if (user && !isRegisteringNow) window.location.href = "/dashboard";
        });

        toggleForm.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            const display = isLoginMode ? "none" : "block";
            formTitle.innerText = isLoginMode ? "Student Login" : "Create Student Account";
            authBtn.innerText = isLoginMode ? "Log In" : "Register";
            usernameGroup.style.display = display;
            schoolGroup.style.display = display;
            toggleForm.innerHTML = isLoginMode ? "Don't have an account? <span>Register here</span>" : "Already have an account? <span>Log in here</span>";
            messageDisplay.innerText = "";
        });

        authBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const username = usernameInput.value.trim();
            const grade = gradeInput.value;
            const studentClass = classInput.value;

            if (isLoginMode) {
                signInWithEmailAndPassword(auth, email, password)
                    .then(() => window.location.href = "/dashboard")
                    .catch((e) => messageDisplay.innerText = "Error: " + e.message);
            } else {
                if (!username || !studentClass) {
                    messageDisplay.innerText = "Error: Username and Class selection are required.";
                    return;
                }
                try {
                    const q = query(collection(db, "users"), where("username_lower", "==", username.toLowerCase()));
                    if (!(await getDocs(q)).empty) {
                        messageDisplay.innerText = "Error: Username taken.";
                        return;
                    }
                    isRegisteringNow = true;
                    const cred = await createUserWithEmailAndPassword(auth, email, password);
                    await updateProfile(cred.user, { displayName: username });
                    await setDoc(doc(db, "users", cred.user.uid), {
                        username,
                        username_lower: username.toLowerCase(),
                        email,
                        grade,
                        class: studentClass,
                        role: "student",
                        warnings: 0,
                        isRestricted: false,
                        isOnline: true
                    });
                    window.location.href = "/dashboard";
                } catch (e) {
                    isRegisteringNow = false;
                    messageDisplay.innerText = "Error: " + e.message;
                }
            }
        });
    </script>
</body>
</html>
