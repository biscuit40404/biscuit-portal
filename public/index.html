<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPortal - Authentication</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-surface: #1e293b;
            --bg-accent: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --brand: #6366f1;
            --brand-hover: #4f46e5;
            --radius-lg: 16px;
            --radius-md: 12px;
            --shadow-smooth: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            --transition-fluid: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-fast: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background: radial-gradient(circle at top right, #1e1b4b, var(--bg-primary));
            overflow: hidden;
        }

        .auth-container {
            background: var(--bg-surface);
            width: 450px;
            max-width: 100%;
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-smooth);
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            transition: var(--transition-fluid);
        }

        /* The Sliding Track Canvas */
        .auth-slider {
            display: flex;
            width: 200%;
            transition: var(--transition-fluid);
        }

        .auth-container.register-mode .auth-slider {
            transform: translateX(-50%);
        }

        .auth-form-block {
            width: 50%;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .auth-header h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .auth-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .input-field-wrapper {
            position: relative;
        }

        .input-field-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            transition: var(--transition-fast);
        }

        .input-field-wrapper input {
            width: 100%;
            padding: 14px 14px 14px 42px;
            background: var(--bg-primary);
            border: 1px solid var(--bg-accent);
            border-radius: var(--radius-md);
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
            transition: var(--transition-fast);
        }

        /* TINY DETAILS: Dynamic Focus Glows */
        .input-field-wrapper input:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25);
        }

        .input-field-wrapper input:focus + i {
            color: var(--brand);
        }

        /* TINY DETAILS: Springy Micro-Interaction Buttons */
        .btn-primary {
            background: var(--brand);
            color: white;
            border: none;
            padding: 14px;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-fast);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            background: var(--brand-hover);
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: scale(0.97); /* Physical dynamic click feedback */
        }

        .auth-switch-text {
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .auth-switch-text span {
            color: var(--brand);
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition-fast);
        }

        .auth-switch-text span:hover {
            color: var(--brand-hover);
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .auth-form-block {
                padding: 24px;
            }
        }
    </style>
</head>
<body>

    <div class="auth-container" id="authCard">
        <div class="auth-slider">
            
            <section class="auth-form-block">
                <div class="auth-header">
                    <h2>Welcome Back</h2>
                    <p>Access your workspace ecosystem</p>
                </div>
                
                <form class="auth-form-block" style="padding:0;" onsubmit="handleAuth(event)">
                    <div class="input-group">
                        <label for="login-email">Email Address</label>
                        <div class="input-field-wrapper">
                            <input type="email" id="login-email" required placeholder="name@school.com">
                            <i class="fa-solid fa-envelope"></i>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="login-password">Password</label>
                        <div class="input-field-wrapper">
                            <input type="password" id="login-password" required placeholder="••••••••">
                            <i class="fa-solid fa-lock"></i>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary">Sign In</button>
                </form>

                <p class="auth-switch-text">
                    New here? <span onclick="toggleAuthMode(true)">Create an account</span>
                </p>
            </section>

            <section class="auth-form-block">
                <div class="auth-header">
                    <h2>Get Started</h2>
                    <p>Setup your persistent institutional account</p>
                </div>
                
                <form class="auth-form-block" style="padding:0;" onsubmit="handleAuth(event)">
                    <div class="input-group">
                        <label for="reg-name">Full Name</label>
                        <div class="input-field-wrapper">
                            <input type="text" id="reg-name" required placeholder="Youssef">
                            <i class="fa-solid fa-user"></i>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="reg-email">Email Address</label>
                        <div class="input-field-wrapper">
                            <input type="email" id="reg-email" required placeholder="name@school.com">
                            <i class="fa-solid fa-envelope"></i>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="reg-password">Password</label>
                        <div class="input-field-wrapper">
                            <input type="password" id="reg-password" required placeholder="••••••••">
                            <i class="fa-solid fa-lock"></i>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary">Register Portal</button>
                </form>

                <p class="auth-switch-text">
                    Have an account? <span onclick="toggleAuthMode(false)">Sign in instead</span>
                </p>
            </section>

        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script>
        // Paste your configuration here
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);

        function toggleAuthMode(toRegister) {
            document.getElementById('authCard').classList.toggle('register-mode', toRegister);
        }

        function handleAuth(event) {
            event.preventDefault();
            // Implement your Firebase Auth methods here. 
            // On success: redirect straight over to your dashboard panel
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
