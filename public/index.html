<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biscuit Portal - Login</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 100%; }
        h1 { color: #2c3e50; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; background: #3498db; color: white; padding: 12px; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
        .btn:hover { background: #2980b9; }
        .toggle-text { margin-top: 20px; color: #7f8c8d; font-size: 14px; cursor: pointer; }
        .toggle-text span { color: #3498db; font-weight: bold; }
        #message { margin-top: 15px; font-weight: bold; font-size: 14px; }
        /* Username box hidden by default on login */
        #username-group { display: none; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🍪 Biscuit Portal</h1>
        <h2 id="form-title">Student Login</h2>
        
        <div id="username-group">
            <input type="text" id="username" placeholder="Choose a unique username">
        </div>
        
        <input type="email" id="email" placeholder="Enter student email">
        <input type="password" id="password" placeholder="Enter password">
        
        <button id="auth-btn" class="btn">Log In</button>
        
        <p class="toggle-text" id="toggle-form">Don't have an account? <span>Register here</span></p>
        <p id="message"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDHBQ20Oan5NYyVbyf-0PMrIBGSNJKLYNY",
            authDomain: "biscuit-portal-1547d.firebaseapp.com",
            projectId: "biscuit-portal-1547d",
            storageBucket: "biscuit-portal-1547d.firebasestorage.app",
            messagingSenderId: "426645012012",
            appId: "1:426645012012:web:cc8d2992c474c40eaa9b89"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const formTitle = document.getElementById('form-title');
        const authBtn = document.getElementById('auth-btn');
        const toggleForm = document.getElementById('toggle-form');
        const usernameGroup = document.getElementById('username-group');
        const usernameInput = document.getElementById('username');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const messageDisplay = document.getElementById('message');

        let isLoginMode = true;

        toggleForm.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            if (isLoginMode) {
                formTitle.innerText = "Student Login";
                authBtn.innerText = "Log In";
                usernameGroup.style.display = "none";
                toggleForm.innerHTML = "Don't have an account? <span>Register here</span>";
            } else {
                formTitle.innerText = "Create Student Account";
                authBtn.innerText = "Register";
                usernameGroup.style.display = "block";
                toggleForm.innerHTML = "Already have an account? <span>Log in here</span>";
            }
            messageDisplay.innerText = "";
        });

        authBtn.addEventListener('click', () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const username = usernameInput.value.trim();

            // STRICT INPUT VALIDATION FILTER
            // Checks for string@domain.extension (e.g., stops things like 1234@asdasd with no .com/.net/.edu)
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            
            if (!emailRegex.test(email)) {
                messageDisplay.innerText = "Error: Please enter a valid email format (e.g., student@school.com).";
                messageDisplay.style.color = "#c0392b";
                return;
            }

            if (password.length < 6) {
                messageDisplay.innerText = "Error: Password must be at least 6 characters long.";
                messageDisplay.style.color = "#c0392b";
                return;
            }

            messageDisplay.innerText = "Processing...";
            messageDisplay.style.color = "#2c3e50";

            if (isLoginMode) {
                signInWithEmailAndPassword(auth, email, password)
                    .then(() => {
                        messageDisplay.innerText = "Success! Loading dashboard...";
                        messageDisplay.style.color = "#27ae60";
                        window.location.href = "/dashboard";
                    })
                    .catch((error) => {
                        messageDisplay.innerText = "Error: " + error.message;
                        messageDisplay.style.color = "#c0392b";
                    });
            } else {
                if (!username) {
                    messageDisplay.innerText = "Error: Please choose a username.";
                    messageDisplay.style.color = "#c0392b";
                    return;
                }

                createUserWithEmailAndPassword(auth, email, password)
                    .then((userCredential) => {
                        const user = userCredential.user;
                        
                        // 1. Write the username into Firebase Auth's profile system
                        return updateProfile(user, { displayName: username }).then(() => {
                            // 2. Write the username and role into the Firestore Database
                            return setDoc(doc(db, "users", user.uid), {
                                username: username,
                                email: email,
                                role: "student"
                            });
                        });
                    })
                    .then(() => {
                        messageDisplay.innerText = "Account verified & registered! You can now log in.";
                        messageDisplay.style.color = "#27ae60";
                        // Flip view back to login automatically
                        toggleForm.click();
                        emailInput.value = email;
                    })
                    .catch((error) => {
                        messageDisplay.innerText = "Error: " + error.message;
                        messageDisplay.style.color = "#c0392b";
                    });
            }
        });
    </script>
</body>
</html>
